name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend + self-contained jar
        run: bash scripts/build.sh

      - name: Chart render test (headless ECharts SSR)
        working-directory: frontend
        run: |
          npx esbuild src/__tests__/chartOption.render.ts \
            --bundle --format=esm --platform=node --outfile=/tmp/chart-test.mjs
          node /tmp/chart-test.mjs

      - name: Smoke test the packaged jar
        run: |
          QUIBBLER_NO_BROWSER=1 java -jar dist/quibbler.jar 8099 &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:8099/" >/dev/null 2>&1 && break
            sleep 0.5
          done
          echo "--- GET / (first 200 bytes) ---"
          curl -fsS "http://127.0.0.1:8099/" | head -c 200; echo
          curl -fsS "http://127.0.0.1:8099/" | grep -qi quibbler \
            && echo "PASS: UI served from the jar" \
            || { echo "FAIL: UI not served"; kill $SERVER_PID; exit 1; }
          kill $SERVER_PID
