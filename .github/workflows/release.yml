name: Release

# Tag a commit to publish a release:  git tag v0.1.0 && git push --tags
# Or run manually (builds artifacts without publishing a release).
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g. 0.1.0)
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  # --- Small JAR + launcher (needs Java 17 on the user's machine) ---
  jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bash scripts/build.sh

      - name: Stage bundle
        run: |
          V="${{ steps.v.outputs.version }}"
          DIR="quibbler-$V"
          mkdir -p "stage/$DIR"
          cp dist/quibbler.jar "stage/$DIR/quibbler.jar"
          cp packaging/start-quibbler.bat packaging/start-quibbler.sh packaging/README.txt "stage/$DIR/"
          chmod +x "stage/$DIR/start-quibbler.sh"
          (cd stage && zip -r "../quibbler-$V.zip" "$DIR")

      - uses: actions/upload-artifact@v4
        with:
          name: jar-zip
          path: quibbler-*.zip

  # --- Self-contained Windows app image (bundles Java — nothing to install) ---
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build jar
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build.ps1

      - name: jpackage (bundled-runtime app image)
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\package-windows.ps1 -Version ${{ steps.v.outputs.version }}

      - name: Zip app image
        shell: pwsh
        run: Compress-Archive -Path dist/win/quibbler -DestinationPath "quibbler-win-${{ steps.v.outputs.version }}.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: win-zip
          path: quibbler-win-*.zip

  # --- Self-contained macOS .app (bundles Java — nothing to install) ---
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bash scripts/build.sh

      - name: jpackage (bundled-runtime app image)
        run: bash scripts/package-unix.sh "${{ steps.v.outputs.version }}"

      - name: Zip .app (ditto preserves the bundle)
        run: ditto -c -k --keepParent "dist/app/quibbler.app" "quibbler-mac-${{ steps.v.outputs.version }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-zip
          path: quibbler-mac-*.zip

  # --- Self-contained Linux app image (bundles Java — nothing to install) ---
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bash scripts/build.sh

      - name: jpackage (bundled-runtime app image)
        run: bash scripts/package-unix.sh "${{ steps.v.outputs.version }}"

      - name: Tar app image (preserves exec bit on bin/quibbler)
        run: tar -C dist/app -czf "quibbler-linux-${{ steps.v.outputs.version }}.tar.gz" quibbler

      - uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: quibbler-linux-*.tar.gz

  # --- Publish a GitHub Release with all downloads (tag pushes only) ---
  release:
    needs: [ jar, windows, mac, linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
